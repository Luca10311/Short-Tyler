<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Short Tyler</title>
    <style>
        /* Reset and full height setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            background-color: #121214; /* Deep dark background */
            color: #ffffff; /* Default all text to white */
        }

        /* Top content styling */
        .top-content {
            text-align: center;
        }

        .profile-pic {
            max-width: 300px;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6), 0 0 2px rgba(255, 255, 255, 0.15);
        }

        h1 {
            margin-top: 20px;
            font-size: 2rem;
            color: #ffffff; /* Pure white */
            letter-spacing: -0.5px;
        }

        p {
            margin-top: 8px;
            font-size: 1.1rem;
            color: #ffffff; /* Pure white */
        }

        /* Footer styling */
        footer {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            margin-top: auto;
            padding-top: 20px;
        }

        .footer-center {
            grid-column: 2;
            font-size: 1rem;
            color: #ffffff; /* Pure white */
        }

        .footer-right {
            grid-column: 3;
            text-align: right;
            font-size: 0.9rem;
            color: #ffffff; /* Pure white */
        }
    </style>
</head>
<body>

    <!-- Top Center Content -->
    <div class="top-content">
        <img src="assets/tyler.heic" alt="Tyler" class="profile-pic">
        <h1>Tyler</h1>
        <p>I like chicken and cheese</p>
    </div>

    <!-- Bottom Content -->
    <footer>
        <div class="footer-center">cats and Dogs</div>
        <div class="footer-right">&copy; Luca</div>
    </footer>

</body>
</html>
